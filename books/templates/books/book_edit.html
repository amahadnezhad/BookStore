{% extends '_base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}ویرایش کتاب {{ book.title }}{% endblock page_title %}

{% block content %}
    <h1>{{ book.title }}</h1>
    <form action="" method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">ذخیره</button>
    </form>
    <br>
    <a href="{% url 'book_list' %}">لیست همه کتاب ها</a>

{% endblock content %}
