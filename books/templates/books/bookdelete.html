{% extends '_base.html' %}
{% block page_title %}حذف کتاب {{ book.title }}{% endblock page_title%}

{% block content %}
    <h1>{{ book.title }} حذف کتاب </h1>
    <p>آیا از حذف کردن کتاب {{ book.title }} مطمئن هستید؟</p>
    <form action="" method="POST">
    {% csrf_token %}
    <a href="{% url 'book_delete' book.id %}">
        <button type="submit" class="btn btn-danger">
            حذف
        </button>
    </a>
    </form>
    <br>
    <a href="{% url 'book_list' %}">لیست همه کتاب ها</a>

{% endblock content %}
